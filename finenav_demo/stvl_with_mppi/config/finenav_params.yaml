# FineNav Engine Parameters
#
# 本文件统一管理 FineNavEngine 中全局单例的 generate_parameter_library 参数：
#   - FineNavLocalizer  （私有子节点 /hello_finenav/finenav_localizer）
#   - Navigator         （私有子节点 /hello_finenav/finenav_navigator）
#
# 与 mppi_params.yaml 一并在 launch 文件中传入同一 Node 即可生效。
# ──────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# FineNavLocalizer
# 完整节点路径: /hello_finenav/finenav_localizer
# ══════════════════════════════════════════════════════════════════════════════
hello_finenav/finenav_localizer:
  ros__parameters:
    # 是否透传
    passthrough: true
    # 是否强制 2D 输出（getState/getStateAt 的 z/roll/pitch 归零）
    force_2d_mode: true
    # ESKF 更新循环频率 [Hz]
    update_rate_hz: 50.0
    # 最大可容忍的观测延迟 [s]
    max_delay_sec: 0.12
    # 位姿观测复用次数（R 矩阵按此倍数缩放）
    pose_smoothing_steps: 4
    # 速度观测复用次数
    twist_smoothing_steps: 1
    # dt 上限 [s]
    max_dt_sec: 0.5
    # 每类观测队列容量
    max_obs_queue_size: 64
    model:
      # 线速度过程噪声标准差 [m/s/√s]
      vel_noise_std: 0.1
      # 角速度过程噪声标准差 [rad/s/√s]
      omega_noise_std: 0.1


# ══════════════════════════════════════════════════════════════════════════════
# Navigator
# 完整节点路径: /hello_finenav/finenav_navigator
# ══════════════════════════════════════════════════════════════════════════════
hello_finenav/finenav_navigator:
  ros__parameters:
    # Action Server 名称（客户端向此名称发送 NavigateToPose 目标）
    action_name: "navigate_to_pose"
    # 行为树 tick 频率 [Hz]
    tick_frequency: 50
    # BT 插件库列表（格式: "package_name/subfolder"）
    # finenav_navigator 的条件插件安装在 lib/plugins/
    plugins:
      - "finenav_navigator/lib/plugins"
      - "finenav_demo/lib/plugins"
    # 行为树 XML 文件目录（格式: "package_name/subfolder"）
    # navigate_to_pose.xml 安装在 share/finenav_demo/behavior_tree/
    behavior_trees:
      - "finenav_demo/behavior_tree"

# ══════════════════════════════════════════════════════════════════════════════
# HelloFinenav Main Node
# 包含地形分析、STVL等模块参数
# ══════════════════════════════════════════════════════════════════════════════
hello_finenav:
  ros__parameters:
    astar_map_view:
      lethal_radius: 0.20         # [m] 硬膨胀半径，范围内 cost=253 不可通行
      inflation_radius: 0.50      # [m] 软膨胀外边界半径
      cost_scaling_factor: 10.0   # 软膨胀指数衰减系数，越大衰减越快
    terrain_analysis:
      cost_scaling_factor: 0.5
      robot_height: 1.0
      max_gradient: 0.12
      nan_fill_radius: 1.5
      # ── Simple Z-threshold mode ──────────────────────────────────────
      # 设为 true 则用简单的 Z 高度阈值判断障碍物（忽略坡度等复杂分析）。
      # 每个栅格柱上的最高 voxel z 超过 robot_pose_z + z_obstacle_threshold 即为障碍。
      use_simple_z_threshold: true
      z_obstacle_threshold: 0.03    # [m] 高于机器人当前 Z 多少即视为障碍
    stvl_manager:
      decay_time_sec: 2.0
      decay_time_fov_sec: 2.0
      min_range: 0.0
      max_range: 50.0
      min_angle: 0.0
      max_angle: 1.047 # M_PI / 3.0
    collision_model:
      # ── 非对称 OBB 模式（推荐用于差速机器人等非对称构型）───────────────────
      # 机器人本体坐标系：X=前, Y=左, Z=上。所有值均为正数，表示从机器人中心
      # 到对应方向边缘的距离。当 front 参数存在时优先使用非对称模式，
      # 否则回退到对称的 length/width/height。
      front:  0.2   # [m] 机器人中心 → 前方边缘 (+X) # TODO: 这个得改的
      back:   0.2   # [m] 机器人中心 → 后方边缘 (-X，取正)
      left:   0.2   # [m] 机器人中心 → 左侧边缘 (+Y)
      right:  0.2   # [m] 机器人中心 → 右侧边缘 (-Y，取正)
      top:    0.0   # [m] 机器人中心 → 上方边缘 (+Z)
      bottom: 0.0   # [m] 机器人中心 → 下方边缘 (-Z，取正)
      # ── 对称 OBB 模式（向后兼容）───────────────────────────────────────────
      length: 0.4  # OBB 长轴 [m]，对应机器人前后方向
      width:  0.4  # OBB 短轴 [m]，对应机器人左右方向
      height: 0.0  # OBB 高度 [m]，0 表示 2D 模型
    occ_grid_2d:
      occupancy_threshold: 50  # 占据阈值 [0,100]，>= 此值视为障碍

# ══════════════════════════════════════════════════════════════════════════════
# AstarPathSearch（A* 全局路径搜索）
# 完整节点路径: /hello_finenav/astar_layer
# ══════════════════════════════════════════════════════════════════════════════
hello_finenav/astar_layer:
  ros__parameters:
    astar_planner:
      connectivity: "8"              # 4/8 for 2-D, 6/18/26 for 3-D
      heuristic: "Euclidean"         # Euclidean | Manhattan | Chebyshev
      goal_tolerance: 0.5            # [m] acceptable distance to goal
      max_iterations: 1000000        # max nodes expanded (-1 = unlimited)
      max_planning_time: 5.0         # [s] max wall-clock planning time
      movement_weight: 1.0           # weight for movement cost in A* eval
      greedy_weight: 1.001           # weight for greedy heuristic

# ══════════════════════════════════════════════════════════════════════════════
# MPPI ControlLayer（RotateShim + MPPIController）
# 完整节点路径: /hello_finenav/mppi_layer
# ══════════════════════════════════════════════════════════════════════════════
hello_finenav/mppi_layer:
  ros__parameters:
    finenav_rotate_shim:
      forward_sampling_distance: 0.5   # [m] 在前方多远采样目标朝向
      angular_speed: 0.6               # [rad/s] 原地旋转角速度
      angular_dist_threshold: 0.15      # [rad] 朝向误差阈值 
      close_to_goal_threshold: 0.5     # [m] 距离 goal 多近时直接对齐 goal 朝向
